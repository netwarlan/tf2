name: Build and Publish

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      new-version: ${{ steps.version.outputs.new-version }}
      skipped: ${{ steps.version.outputs.skipped }}
      changelog: ${{ steps.version.outputs.changelog }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Fix git ownership for Docker actions
        run: |
          git config --global --add safe.directory /github/workspace
          mkdir -p "$RUNNER_TEMP/_github_home"
          git config --file "$RUNNER_TEMP/_github_home/.gitconfig" --add safe.directory /github/workspace
      - uses: netwarlan/action-semantic-versioning@v1
        id: version
        with:
          dry-run: 'true'
          bump-patch-on-unknown: 'true'

  build:
    needs: [version]
    uses: netwarlan/action-container-build/.github/workflows/build-publish.yaml@v1
    secrets: inherit
    with:
      image-name: ${{ github.event.repository.name }}
      version: ${{ needs.version.outputs.new-version }}

  release:
    needs: [version, build]
    if: needs.version.outputs.new-version != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANGELOG: ${{ needs.version.outputs.changelog }}
        run: |
          if [ -n "$CHANGELOG" ]; then
            gh release create "${{ needs.version.outputs.new-version }}" --notes "$CHANGELOG"
          else
            gh release create "${{ needs.version.outputs.new-version }}" --generate-notes
          fi
