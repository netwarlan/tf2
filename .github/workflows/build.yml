name: Build and Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io/netwarlan

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      new-version: ${{ steps.version.outputs.new-version }}
      skipped: ${{ steps.version.outputs.skipped }}
      changelog: ${{ steps.version.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fix git ownership for Docker actions
        run: |
          git config --global --add safe.directory /github/workspace
          mkdir -p "$RUNNER_TEMP/_github_home"
          git config --file "$RUNNER_TEMP/_github_home/.gitconfig" --add safe.directory /github/workspace
      - uses: netwarlan/action-semantic-versioning@v1
        id: version
        with:
          dry-run: 'true'
          bump-patch-on-unknown: 'true'

  build:
    needs: [version]
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/tf2
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref_name == 'main' }}
            type=sha,prefix=
            type=raw,value=${{ needs.version.outputs.new-version }},enable=${{ needs.version.outputs.new-version != '' }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs: [version, build]
    if: needs.version.outputs.new-version != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANGELOG: ${{ needs.version.outputs.changelog }}
        run: |
          if [ -n "$CHANGELOG" ]; then
            gh release create "${{ needs.version.outputs.new-version }}" --notes "$CHANGELOG"
          else
            gh release create "${{ needs.version.outputs.new-version }}" --generate-notes
          fi
