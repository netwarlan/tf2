name: Build and Publish

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: cocogitto/cocogitto-action@v4
        id: cocogitto
        with:
          release: true
          check: true
          check-latest-tag-only: true
      - name: Set version output
        id: version
        run: echo "version=${{ steps.cocogitto.outputs.version }}" >> "$GITHUB_OUTPUT"

  build:
    needs: [version]
    permissions:
      contents: read
      packages: write
    uses: netwarlan/action-container-build/.github/workflows/build-publish.yaml@v1
    secrets: inherit
    with:
      image-name: ${{ github.event.repository.name }}
      version: ${{ needs.version.outputs.version }}

  release:
    needs: [version, build]
    if: needs.version.outputs.version != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag "${{ needs.version.outputs.version }}"
          git push origin "${{ needs.version.outputs.version }}"
          gh release create "${{ needs.version.outputs.version }}" --generate-notes
